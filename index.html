<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Math | Raciocínio Rápido Tático</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --bg-dark: #050505;
            --card-bg: rgba(10, 10, 15, 0.95);
            --current-color: var(--neon-blue);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding-bottom: 70px;
        }

        /* Título Principal */
        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--current-color);
            text-shadow: 0 0 15px var(--current-color);
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.5s;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--bg-dark) 95%, var(--current-color) 95%),
                              linear-gradient(90deg, var(--bg-dark) 95%, var(--current-color) 95%);
            background-size: 40px 40px;
            opacity: 0.1;
            z-index: -1;
            transition: 0.5s;
        }

        #game-hull {
            width: 95%;
            max-width: 450px;
            background: var(--card-bg);
            border: 2px solid var(--current-color);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Status Area */
        .status-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .phase-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--current-color);
            text-transform: uppercase;
        }

        #timer-container {
            width: 50px;
            height: 50px;
            border: 2px solid var(--current-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: white;
            text-shadow: 0 0 10px var(--current-color);
        }

        /* Question and Answer Visualizer */
        #question {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            margin: 10px 0;
        }

        #answer-visualizer {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--current-color);
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--current-color);
        }

        #answer-visualizer:empty::before {
            content: "??";
            color: rgba(255,255,255,0.2);
            text-shadow: none;
        }

        /* Custom Keyboard */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .key-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-btn:active, .key-btn.active {
            background: var(--current-color);
            color: black;
            box-shadow: 0 0 15px var(--current-color);
            transform: scale(0.95);
        }

        .key-btn.key-action {
            grid-column: span 2;
            background: var(--current-color);
            color: black;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: 900;
        }

        .key-btn.key-danger {
            color: var(--neon-red);
            font-family: sans-serif; /* For better backspace icon */
        }

        .key-btn.key-danger:active {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 15px var(--neon-red);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #aaa;
        }

        .stat-card span {
            color: white;
            font-weight: bold;
        }

        /* Screens and Buttons */
        .screen { display: none; flex-direction: column; gap: 20px; }
        .active { display: flex; }

        .sys-btn {
            background: var(--current-color);
            color: black;
            border: none;
            padding: 18px 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.2s;
        }

        .sys-btn:active { transform: scale(0.95); box-shadow: 0 0 20px var(--current-color); }

        /* Ad Footer */
        #ad-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-top: 1px solid var(--current-color);
        }

        /* Animations */
        .error-shake { animation: shake 0.4s; border-color: var(--neon-red) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div class="grid-bg" id="grid"></div>

    <h1 class="app-title" id="main-title">Raciocínio Rápido</h1>

    <div id="game-hull">
        <div id="start-screen" class="screen active">
            <p style="font-size: 0.9rem; letter-spacing: 2px; color: #666; margin: 20px 0;">PROTOCOLO TÁTICO // TECLADO INTEGRADO</p>
            <button class="sys-btn" onclick="startGame()">ACESSAR SISTEMA</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-area">
                <div class="phase-header" id="phase-label">FASE 1 // KERNEL</div>
                <div id="timer-container"><span id="timer">60</span></div>
            </div>
            
            <div id="question">--</div>
            
            <div id="answer-visualizer"></div>

            <div class="keyboard-grid">
                <div class="key-btn" onclick="pressKey('1')">1</div>
                <div class="key-btn" onclick="pressKey('2')">2</div>
                <div class="key-btn" onclick="pressKey('3')">3</div>
                <div class="key-btn" onclick="pressKey('4')">4</div>
                <div class="key-btn" onclick="pressKey('5')">5</div>
                <div class="key-btn" onclick="pressKey('6')">6</div>
                <div class="key-btn" onclick="pressKey('7')">7</div>
                <div class="key-btn" onclick="pressKey('8')">8</div>
                <div class="key-btn" onclick="pressKey('9')">9</div>
                <div class="key-btn key-danger" onclick="pressKey('back')">⌫</div>
                <div class="key-btn" onclick="pressKey('0')">0</div>
                <div class="key-btn key-action" onclick="submitAnswer()">ENTRAR</div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">SCORE: <span id="score">0</span></div>
                <div class="stat-card">ALVO: <span id="target">50</span></div>
            </div>
        </div>

        <div id="end-screen" class="screen">
            <h2 id="end-title" style="font-family: 'Orbitron'; color: var(--neon-red); margin-bottom: 20px;">SISTEMA OFFLINE</h2>
            <p id="end-score-msg" style="margin-bottom: 20px;">Pontuação Final: <span id="final-score" style="color:var(--current-color); font-weight:bold;">0</span></p>
            <button class="sys-btn" onclick="location.reload()">REBOOT</button>
        </div>
    </div>

    <div id="ad-footer">
        <script type="text/javascript">
            atOptions = {
                'key' : '2a5e7302edec5e07fb8153e06aa96446',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/2a5e7302edec5e07fb8153e06aa96446/invoke.js"></script>
    </div>

    <script>
        // CONFIGURAÇÃO DO JOGO
        const phases = [
            { name: "FASE 1 // KERNEL", target: 50, color: "#00f3ff", ops: ['+'], range: 10 },
            { name: "FASE 2 // FIREWALL", target: 150, color: "#bc13fe", ops: ['+', '-'], range: 25 },
            { name: "FASE 3 // MAINFRAME", target: 400, color: "#39ff14", ops: ['*', '+'], range: 12 },
            { name: "FASE 4 // SINGULARITY", target: 1000, color: "#ff3131", ops: ['/', '*'], range: 20 }
        ];

        let currentPhase = 0;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let currentAnswer;
        let playerAnswer = ""; // Armazena a resposta digitada

        // ELEMENTOS DOM
        const hull = document.getElementById('game-hull');
        const mainTitle = document.getElementById('main-title');
        const answerVisualizer = document.getElementById('answer-visualizer');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // MOTOR DE ÁUDIO
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1300, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'key') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            }
        }

        // LÓGICA DO JOGO
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            audioCtx.resume();
            showScreen('game-screen');
            updateUI();
            currentPhase = 0;
            score = 0;
            document.getElementById('score').innerText = score;
            newQuestion();
        }

        function startTimer() {
            timeLeft = 60;
            document.getElementById('timer').innerText = timeLeft;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) handleWrong();
            }, 1000);
        }

        function newQuestion() {
            playerAnswer = ""; // Reseta a resposta digitada
            updateAnswerVisualizer();
            
            const p = phases[currentPhase];
            const op = p.ops[Math.floor(Math.random() * p.ops.length)];
            let n1, n2;

            if (op === '*') { n1 = Math.floor(Math.random() * p.range) + 2; n2 = Math.floor(Math.random() * 9) + 2; }
            else if (op === '/') { n2 = Math.floor(Math.random() * 8) + 2; n1 = n2 * (Math.floor(Math.random() * 9) + 1); }
            else { n1 = Math.floor(Math.random() * p.range) + 1; n2 = Math.floor(Math.random() * p.range) + 1; }

            currentAnswer = eval(`${n1}${op}${n2}`);
            document.getElementById('question').innerText = `${n1}${op === '*' ? '×' : op === '/' ? '÷' : op}${n2}`;
            startTimer();
        }

        // LÓGICA DO TECLADO CUSTOMIZADO
        function pressKey(key) {
            playSound('key');
            if (key === 'back') {
                playerAnswer = playerAnswer.slice(0, -1);
            } else if (playerAnswer.length < 5) { // Limite tático de 5 dígitos
                playerAnswer += key;
            }
            updateAnswerVisualizer();
        }

        function updateAnswerVisualizer() {
            answerVisualizer.innerText = playerAnswer;
        }

        function submitAnswer() {
            if (playerAnswer === "") return;
            
            const val = parseInt(playerAnswer);
            if (val === currentAnswer) {
                handleCorrect();
            } else {
                handleWrong();
            }
        }

        function handleCorrect() {
            playSound('correct');
            score += 10;
            document.getElementById('score').innerText = score;
            if (score >= phases[currentPhase].target && currentPhase < phases.length - 1) {
                currentPhase++;
                updateUI();
            }
            newQuestion();
        }

        function handleWrong() {
            playSound('wrong');
            score = Math.max(0, score - 15);
            document.getElementById('score').innerText = score;
            
            // Feedback visual de erro (shake e brilho vermelho)
            hull.classList.add('error-shake');
            setTimeout(() => hull.classList.remove('error-shake'), 400);
            
            newQuestion();
        }

        function updateUI() {
            const p = phases[currentPhase];
            document.documentElement.style.setProperty('--current-color', p.color);
            document.getElementById('phase-label').innerText = p.name;
            document.getElementById('target').innerText = p.target;
            mainTitle.style.color = p.color;
            mainTitle.style.textShadow = `0 0 15px ${p.color}`;
            const adFooter = document.getElementById('ad-footer');
            if(adFooter) adFooter.style.borderColor = p.color;
        }

        // Adiciona suporte a teclado físico para PC (opcional, mantendo a tática)
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('game-screen').classList.contains('active')) {
                if (e.key >= '0' && e.key <= '9') pressKey(e.key);
                if (e.key === 'Backspace') pressKey('back');
                if (e.key === 'Enter') submitAnswer();
            }
        });
    </script>
</body>
</html>
